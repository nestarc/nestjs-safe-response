name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
        include:
          # Default: NestJS 11 + Swagger 11 (current devDependencies)
          - nestjs-version: 11
            swagger-version: 11
            override: false
          # NestJS 10 + Swagger 8 (cross-version compat)
          - nestjs-version: 10
            swagger-version: 8
            override: true

    name: Node ${{ matrix.node-version }} / NestJS ${{ matrix.nestjs-version }} / Swagger ${{ matrix.swagger-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Override to NestJS ${{ matrix.nestjs-version }} + Swagger ${{ matrix.swagger-version }}
        if: matrix.override
        run: |
          npm install --no-save --legacy-peer-deps \
            @nestjs/common@^${{ matrix.nestjs-version }} \
            @nestjs/core@^${{ matrix.nestjs-version }} \
            @nestjs/platform-express@^${{ matrix.nestjs-version }} \
            @nestjs/testing@^${{ matrix.nestjs-version }} \
            @nestjs/swagger@^${{ matrix.swagger-version }}

      - run: npm run build
      - run: npm test
      - run: npm run test:e2e
